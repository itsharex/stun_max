name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-server:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build server binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          SUFFIX="${GOOS}-${GOARCH}"
          mkdir -p build

          echo "Building server (${SUFFIX})..."
          go build -ldflags="-s -w" -o "build/stun_max-server-${SUFFIX}" ./server/

          echo "Building stunserver (${SUFFIX})..."
          go build -ldflags="-s -w" -o "build/stun_max-stunserver-${SUFFIX}" ./tools/stunserver/

          echo "Building CLI client (${SUFFIX})..."
          go build -tags cli -ldflags="-s -w" -o "build/stun_max-cli-${SUFFIX}" ./client/

          echo "Building natcheck (${SUFFIX})..."
          go build -ldflags="-s -w" -o "build/natcheck-${SUFFIX}" ./tools/natcheck/

          echo "Building punchtest (${SUFFIX})..."
          go build -ldflags="-s -w" -o "build/punchtest-${SUFFIX}" ./tools/punchtest/

      - name: Download ip2region database
        run: |
          go get github.com/lionsoul2014/ip2region/binding/golang@latest
          XDB=$(find $(go env GOMODCACHE) -name "ip2region_v4.xdb" 2>/dev/null | head -1)
          if [ -n "$XDB" ]; then
            cp "$XDB" build/ip2region.xdb
            echo "ip2region.xdb copied ($(du -h build/ip2region.xdb | cut -f1))"
          fi

      - name: Package server deploy zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p build/stun-max-server-${SUFFIX}
          cp build/stun_max-server-${SUFFIX} build/stun-max-server-${SUFFIX}/stun_max-server
          cp build/stun_max-stunserver-${SUFFIX} build/stun-max-server-${SUFFIX}/stun_max-stunserver
          cp -r web build/stun-max-server-${SUFFIX}/web
          cp install.sh build/stun-max-server-${SUFFIX}/
          [ -f build/ip2region.xdb ] && cp build/ip2region.xdb build/stun-max-server-${SUFFIX}/
          chmod +x build/stun-max-server-${SUFFIX}/stun_max-server
          chmod +x build/stun-max-server-${SUFFIX}/stun_max-stunserver
          chmod +x build/stun-max-server-${SUFFIX}/install.sh
          cd build && zip -r "stun-max-server-${VERSION}-${SUFFIX}.zip" "stun-max-server-${SUFFIX}/"
          echo "Server package:"
          ls -lh "stun-max-server-${VERSION}-${SUFFIX}.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/stun_max-server-${{ matrix.goos }}-${{ matrix.goarch }}
            build/stun_max-stunserver-${{ matrix.goos }}-${{ matrix.goarch }}
            build/stun_max-cli-${{ matrix.goos }}-${{ matrix.goarch }}
            build/natcheck-${{ matrix.goos }}-${{ matrix.goarch }}
            build/punchtest-${{ matrix.goos }}-${{ matrix.goarch }}
            build/stun-max-server-*.zip
            build/ip2region.xdb
          draft: false
          prerelease: false

  build-windows:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Windows binaries
        run: |
          mkdir -p build

          echo "Building Windows GUI client..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags="-s -w -H windowsgui" -o "build/stun_max-client-windows-amd64.exe" ./client/

          echo "Building Windows CLI client..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -tags cli \
            -ldflags="-s -w" -o "build/stun_max-cli-windows-amd64.exe" ./client/

          echo "Building Windows natcheck..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" -o "build/natcheck-windows-amd64.exe" ./tools/natcheck/

          echo "Building Windows punchtest..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags="-s -w" -o "build/punchtest-windows-amd64.exe" ./tools/punchtest/

          ls -lh build/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/stun_max-client-windows-amd64.exe
            build/stun_max-cli-windows-amd64.exe
            build/natcheck-windows-amd64.exe
            build/punchtest-windows-amd64.exe
          draft: false
          prerelease: false

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build macOS binaries
        run: |
          mkdir -p build

          echo "Building macOS GUI client (arm64)..."
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w" -o "build/stun_max-client-darwin-arm64" ./client/

          echo "Building macOS CLI client (arm64)..."
          GOOS=darwin GOARCH=arm64 go build -tags cli \
            -ldflags="-s -w" -o "build/stun_max-cli-darwin-arm64" ./client/

          echo "Building macOS natcheck (arm64)..."
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w" -o "build/natcheck-darwin-arm64" ./tools/natcheck/

          echo "Building macOS punchtest (arm64)..."
          GOOS=darwin GOARCH=arm64 go build \
            -ldflags="-s -w" -o "build/punchtest-darwin-arm64" ./tools/punchtest/

          ls -lh build/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/stun_max-client-darwin-arm64
            build/stun_max-cli-darwin-arm64
            build/natcheck-darwin-arm64
            build/punchtest-darwin-arm64
          draft: false
          prerelease: false

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install Android NDK
        run: sdkmanager --install "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"

      - name: Install gogio
        run: go install gioui.org/cmd/gogio@latest

      - name: Build Android APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p build

          gogio \
            -target android \
            -appid com.stunmax.app \
            -version "${VERSION}" \
            -minsdk 24 \
            -o "build/stun_max-android-${VERSION}.apk" \
            ./client/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/stun_max-android-*.apk
          draft: false
          prerelease: false
