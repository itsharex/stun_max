name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Create release first with commit log as body
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from commits
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF#refs/tags/}" ]; then
            NOTES=$(git log --oneline -20 --pretty=format:"- %s")
          else
            NOTES=$(git log --oneline "${PREV_TAG}..HEAD" --pretty=format:"- %s")
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "STUN Max ${GITHUB_REF#refs/tags/}"
          body: |
            ## Changes
            ${{ steps.notes.outputs.notes }}

            ## Install
            ```bash
            curl -fsSL https://raw.githubusercontent.com/uk0/stun_max/main/install.sh | sudo bash
            ```
          draft: false
          prerelease: false

  build-server:
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Determine version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build server binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          SUFFIX="${GOOS}-${GOARCH}"
          mkdir -p build

          echo "Building server (${SUFFIX})..."
          go build -ldflags="-s -w" -o "build/stun_max-server-${SUFFIX}" ./server/

          echo "Building stunserver (${SUFFIX})..."
          go build -ldflags="-s -w" -o "build/stun_max-stunserver-${SUFFIX}" ./tools/stunserver/

          echo "Building CLI client (${SUFFIX})..."
          go build -tags cli -ldflags="-s -w" -o "build/stun_max-cli-${SUFFIX}" ./client/

          echo "Building natcheck (${SUFFIX})..."
          go build -ldflags="-s -w" -o "build/natcheck-${SUFFIX}" ./tools/natcheck/

          echo "Building punchtest (${SUFFIX})..."
          go build -ldflags="-s -w" -o "build/punchtest-${SUFFIX}" ./tools/punchtest/

      - name: Download ip2region database
        run: |
          go get github.com/lionsoul2014/ip2region/binding/golang@latest
          XDB=$(find $(go env GOMODCACHE) -name "ip2region_v4.xdb" 2>/dev/null | head -1)
          [ -n "$XDB" ] && cp "$XDB" build/ip2region.xdb

      - name: Package server deploy zip
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SUFFIX="${{ matrix.goos }}-${{ matrix.goarch }}"
          PKG="stun-max-server-${SUFFIX}"
          mkdir -p "build/${PKG}"
          cp build/stun_max-server-${SUFFIX} "build/${PKG}/stun_max-server"
          cp build/stun_max-stunserver-${SUFFIX} "build/${PKG}/stun_max-stunserver"
          cp -r web "build/${PKG}/web"
          cp install.sh "build/${PKG}/"
          [ -f build/ip2region.xdb ] && cp build/ip2region.xdb "build/${PKG}/"
          chmod +x "build/${PKG}/stun_max-server" "build/${PKG}/stun_max-stunserver" "build/${PKG}/install.sh"
          cd build && zip -r "${PKG}-${VERSION}.zip" "${PKG}/"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/stun_max-server-${{ matrix.goos }}-${{ matrix.goarch }}
            build/stun_max-stunserver-${{ matrix.goos }}-${{ matrix.goarch }}
            build/stun_max-cli-${{ matrix.goos }}-${{ matrix.goarch }}
            build/natcheck-${{ matrix.goos }}-${{ matrix.goarch }}
            build/punchtest-${{ matrix.goos }}-${{ matrix.goarch }}
            build/stun-max-server-*-${{ steps.version.outputs.version }}.zip
            build/ip2region.xdb

  build-windows:
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build Windows binaries
        run: |
          mkdir -p build

          echo "Building Windows server..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o "build/stun_max-server-windows-amd64.exe" ./server/

          echo "Building Windows stunserver..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o "build/stun_max-stunserver-windows-amd64.exe" ./tools/stunserver/

          echo "Building Windows GUI client..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -H windowsgui" -o "build/stun_max-client-windows-amd64.exe" ./client/

          echo "Building Windows CLI client..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -tags cli -ldflags="-s -w" -o "build/stun_max-cli-windows-amd64.exe" ./client/

          echo "Building Windows natcheck..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o "build/natcheck-windows-amd64.exe" ./tools/natcheck/

          echo "Building Windows punchtest..."
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o "build/punchtest-windows-amd64.exe" ./tools/punchtest/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*

  build-macos:
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build macOS binaries
        run: |
          mkdir -p build
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o "build/stun_max-client-darwin-arm64" ./client/
          GOOS=darwin GOARCH=arm64 go build -tags cli -ldflags="-s -w" -o "build/stun_max-cli-darwin-arm64" ./client/
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o "build/natcheck-darwin-arm64" ./tools/natcheck/
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o "build/punchtest-darwin-arm64" ./tools/punchtest/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '11076708'

      - name: Install Android NDK
        run: sdkmanager --install "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"

      - name: Install gogio
        run: go install gioui.org/cmd/gogio@latest

      - name: Build Android APK
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # gogio requires semver: major.minor.patch.versioncode (no 'v' prefix)
          SEMVER="${TAG#v}"
          # Ensure 4-part version: x.y.z.code
          IFS='.' read -r -a PARTS <<< "$SEMVER"
          MAJOR="${PARTS[0]:-2}"
          MINOR="${PARTS[1]:-0}"
          PATCH="${PARTS[2]:-0}"
          CODE="${PARTS[3]:-1}"
          VERSION="${MAJOR}.${MINOR}.${PATCH}.${CODE}"

          echo "Tag: ${TAG}, gogio version: ${VERSION}"
          mkdir -p build

          gogio \
            -target android \
            -appid com.stunmax.app \
            -version "${VERSION}" \
            -minsdk 24 \
            -o "build/stun_max-android-${TAG}.apk" \
            ./client/

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/stun_max-android-*.apk
